<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ACS SYSTEM — Login</title>
  <link rel="stylesheet" href="login.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <!-- LOGO ACS SYSTEM -->
      <div class="brand">
        <div class="brand-icon">
          <svg width="42" height="42" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Círculo exterior com pinos (estilo bitcoin) -->
            <circle cx="100" cy="100" r="80" stroke="#00ff88" stroke-width="10" fill="none"/>
            <!-- Pino superior esquerdo -->
            <rect x="72" y="12" width="12" height="24" rx="6" fill="#00ff88"/>
            <!-- Pino superior direito -->
            <rect x="116" y="12" width="12" height="24" rx="6" fill="#00ff88"/>
            <!-- Pino inferior esquerdo -->
            <rect x="72" y="164" width="12" height="24" rx="6" fill="#00ff88"/>
            <!-- Pino inferior direito -->
            <rect x="116" y="164" width="12" height="24" rx="6" fill="#00ff88"/>
            <!-- Triângulo / chevron interior -->
            <path d="M100 52 L148 140 H52 Z" stroke="#00ff88" stroke-width="10" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">ACS SYSTEM</span>
          <span class="brand-sub">SINAIS INTELIGENTES</span>
        </div>
      </div>

      <h1 id="formTitle">Acesse sua conta</h1>
      <p class="subtitle" id="formSubtitle">Entre com o email e senha que você recebeu após a compra.</p>

      <div class="alert" id="alertBox" style="display:none"></div>

      <form id="loginForm">
        <div class="field">
          <label>EMAIL</label>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required/>
        </div>
        <div class="field">
          <label>SENHA</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">ENTRAR</button>
      </form>

      <div class="help-box">
        <p>🔑 Acabou de comprar? Sua senha temporária foi enviada por email.</p>
        <p>❓ Não recebeu ou perdeu a senha? <a href="mailto:suporte@acssystem.com.br">Fale com o suporte</a></p>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
